name: Release Tag

on:
  pull_request:
    types: [closed]
    branches:
      - main
    paths:
      - otwa

permissions:
  contents: write

jobs:
  tag:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Get otwarchive version from submodule
        id: version
        run: |
          VERSION=$(git -C otwa describe --tags --always)
          echo "Submodule is at version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.version }}"
          git push --tags

      - name: Trigger build workflow
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/build.yaml/dispatches \
            -d '{"ref":"${{ steps.version.outputs.version }}"}'
