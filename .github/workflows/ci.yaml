name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
  workflow_run:
    workflows: [Release Tag]
    types:
      - completed

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Check out
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}

      - name: Build and push
        uses: docker/build-push-action@v7
        id: build
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: |
            linux/amd64
            linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test:
    name: Test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    needs: build

    services:
      db:
        image: mariadb:lts
        env:
          MYSQL_ROOT_PASSWORD: change_me

      redis:
        image: redis:7

      es:
        image: docker.elastic.co/elasticsearch/elasticsearch:9.3.0
        env:
          transport.host: localhost
          bootstrap.memory_lock: false
          ES_JAVA_OPTS: -Xms256m -Xmx256m
          discovery.type: single-node
          xpack.security.enabled: false

      otwarchive:
        image: ghcr.io/${{ github.repository }}@${{ needs.build.outputs.digest }}
        env:
          RAILS_ENV: development
          ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY: bEZjYLY9tCYGh6WlcMtEJpIi7GO2plZC
          ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY: PpLWizzsQHIWnIihtECw8nDHZQd0amzf
          ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT: 3S99KdpdEWLnCYudBgUfdCFDBWePWCud
        # yaml-language-server-disable
        command: bash -c "sleep 10 && bash /bin/entrypoint.sh"
        ports:
          - 3000:3000

    steps:
      - name: Health check
        uses: jtalk/url-health-check-action@v5
        with:
          url: http://localhost:3000
          follow-redirect: true
          max-attempts: 20
          retry-delay: 10s
