name: Build Image

on:
  schedule:
    - cron: "0 0 * * *" # every day at 00:00
  workflow_dispatch:

env:
  REPO_FULL: https://github.com/otwcode/otwarchive
  REPO: otwcode/otwarchive
  IMAGE: ghcr.io/${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      should_build: ${{ steps.compare.outputs.should_build }}

    steps:
      - name: Restore last tag
        id: cache
        uses: actions/cache@v5
        with:
          path: .last_tag
          key: last-tag

      - name: Get latest upstream tag
        id: tag
        run: |
          TAG=$(git ls-remote --tags --sort="v:refname" ${{ env.REPO_FULL }} \
            | grep -v '\^{}' \
            | tail -n1 \
            | sed 's#.*/##')
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Compare with last built tag
        id: compare
        run: |
          LAST=$(cat .last_tag 2>/dev/null || echo "")
          if [ "$LAST" = "${{ steps.tag.outputs.tag }}" ]; then
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "${{ steps.tag.outputs.tag }}" > .last_tag
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

  build:
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.should_build == 'true'

    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ env.REPO }}
          ref: ${{ needs.check.outputs.tag }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: config/docker/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ needs.check.outputs.tag }}
            ${{ env.IMAGE }}:latest
          platforms: |
            linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
